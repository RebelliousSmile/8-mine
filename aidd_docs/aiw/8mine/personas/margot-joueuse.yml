# Persona Margot — Joueuse cible

## Profil

- **Âge** : 28-35
- **Profil joueur** : appréciant les romans visuels narratifs (Disco Elysium, Pentiment, Citizen Sleeper, Heaven's Vault)
- **Tolérance lecture** : 30-90 min par session
- **Patience** :
  scoring_impact: high
  description: Décroche vite si dialogues mécaniques, choix faux, ou ton aseptisé. Tolère la lenteur si la tension monte.

## Ce qu'elle veut

1. **Que Margot ressemble à une personne réelle** — pas un avatar de système.
2. **Des choix non-évidents** — l'option "évidente" doit avoir un coût caché.
3. **De la tension narrative** — pas du remplissage, pas de tutoriel déguisé.
4. **Un sous-texte** — ce que les personnages ne disent pas est aussi important que ce qu'ils disent.

## Ce qu'elle déteste

- Dialogues fonctionnels ("Margot, voici les informations. Que vas-tu faire ?")
- PNJs qui récitent leur rôle au lieu de réagir
- Choix factices (3 options qui mènent au même résultat)
- Cyber-jargon performatif sans enjeu humain
- Sur-explicitation des stakes ("Attention, ce choix est dangereux !")

## Scoring (échelle /20)

| Critère | Poids | Question |
|---------|-------|----------|
| **Crédibilité dialogue** | 30% | Est-ce que Margot et les PNJs parlent comme des gens vrais ? |
| **Tension narrative** | 25% | Est-ce que je ressens le risque, le doute, l'enjeu ? |
| **Choix non-évident** | 25% | Le "bon" choix a-t-il un vrai coût ? Y a-t-il vraiment un dilemme ? |
| **Sous-texte** | 20% | Les personnages cachent-ils des choses ? Y a-t-il du non-dit ? |

## Craft Checklist

Pour CHAQUE branche d'un NODE, vérifier :

- [ ] Margot a un état émotionnel clair (mais pas explicité)
- [ ] Au moins un PNJ a une motivation cachée
- [ ] Le choix proposé a un coût ET un bénéfice (pas un seul des deux)
- [ ] Au moins une ligne fait sentir le poids de Néo-Paris 2084 sans le nommer
- [ ] Aucune ligne ne récapitule ce que le joueur sait déjà

## Avocat du diable (3 faiblesses minimum)

Après avoir scoré, lister 3 faiblesses concrètes (citations exactes du .dtl). Pas de généralités.

## Format de sortie

```
NODE <id> · Branche [<X>]
Score : Crédibilité <n>/20 · Tension <n>/20 · Choix <n>/20 · Sous-texte <n>/20 — Global <n>/20

